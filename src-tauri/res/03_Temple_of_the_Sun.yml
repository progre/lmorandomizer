templeOfTheSun/main:
  exits:
    up.gateOfGuidance/main:
    fixed.twinLabyrinthsLeft/main:
    left.infernoCavern/main:
    down.twinLabyrinthsLeft/main:
    warp.templeOfMoonlight/pyramid:
    door.templeOfMoonlight/lower:
    fixed.templeOfTheSun/exitUpper:
    fixed.templeOfTheSun/exitLower:
  mainWeapons:
    knife:
      - shuriken, shurikenAmmo
      - pistol, ammunition # pistol can reach
      - bomb, bombAmmo # bombs can reach
  subWeapons:
    ankhJewel:templeOfTheSun:
  chests:
    bronzeMirror:
      - ankhJewel:templeOfTheSun, handScanner, glyphReader
    map:templeOfTheSun:
    talisman:
      - event:defeatedViy
    boots:
      - event:floodedTempleOfTheSun
      - feather
    sacredOrb:templeOfTheSun:
  shops:
    toukenAmmo, spearAmmo, flareGunAmmo:
      - shuriken, shurikenAmmo
      - pistol, ammunition # pistol can reach
      - bomb, bombAmmo # bombs can reach
      - feather
    heatproofCase, divinerSensation, weights:
    ammunition, bombAmmo, shurikenAmmo:
      - deathSeal, feather # need feather
  roms:
    superCobra:
    yieArKungFu:
    kingsValley:
      - bomb, bombAmmo
  events:
    event:defeatedEllmac:
      - ankhJewel:templeOfTheSun, gameMaster2

templeOfTheSun/exitUpper:
  exits:
    right.chamberOfExtinction/exitUpper:
    fixed.templeOfTheSun/main:

templeOfTheSun/exitLower:
  exits:
    right.chamberOfExtinction/exitLower:
    fixed.templeOfTheSun/main:
