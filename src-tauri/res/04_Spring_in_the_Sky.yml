springInTheSky/main:
  subWeapons:
    ankhJewel:springInTheSky:
      - scalesphere
  chests:
    sacredOrb:springInTheSky:
      - birthSeal # life seal is from the remake
    glove:
      - event:floodedSpringInTheSky
    map:springInTheSky:
    scalesphere:
      - event:SpringElevator, originSeal # new event allows more varied options for getting up
  seals:
    originSeal:
      - event:SpringElevator, helmet
  shops:
    weights, shurikenAmmo, toukenAmmo:
      - event:SpringElevator, originSeal # more varied ways to reach
    _, _, castlevania: # The ShellHorn here isn't shuffled.
      - event:SpringElevator, originSeal, msx2, qBert, divinerSensation # need msx2
  roms:
    hyperSports1:
      - event:SpringElevator, helmet
    cabbagePatchKids:
      - scalesphere
    shalom:
      - bomb, bombAmmo, scalesphere
    quarth:
      - scalesphere
    gameCollection1: # not yet tested with initial status
  events:
    event:SpringElevator:
      - helmet, sacredOrb:2, holyGrail
      - helmet, scalesphere
      - feather, grappleClaw, sacredOrb:4, holyGrail
      - feather, grappleClaw, scalesphere
    event:floodedSpringInTheSky:
      - originSeal, helmet, sacredOrb:8
      - originSeal, helmet, scalesphere
      - originSeal, feather, grappleClaw, sacredOrb:8
      - originSeal, feather, grappleClaw, scalesphere
    event:floodedTempleOfTheSun:
      - scalesphere
      - knife, sacredOrb:6 # tested
      # test how many Sacred Orbs it takes without knife
    event:defeatedBahamut: # TODO: event:subWeaponWallForward いらなくね？
      - event:floodedSpringInTheSky, event:subWeaponWallForward, ankhJewel:springInTheSky, gameMaster2 # deleted event escapefromspringinthesky. added sub weapons
