    - event:lightedUpChamberOfExtinction
  exits:
    up.shrineOfTheMother/lower:
    fixed.chamberOfExtinction/exitUpper:
    fixed.chamberOfExtinction/exitLower:
    door.mazeOfGalious:
  chests:
    sacredOrb:chamberOfExtinction:
      - feather # need a way out
      - originSeal # need a way out
      - holyGrail # need a way out
    map:chamberOfExtinction:
  seals:
    lifeSeal:
      - birthSeal, axe # need axe to open wall
  roms:
    timePilot:
    hyperOlympic1:
    mazeOfGalious:
      - msx2, qBert, divinerSensation
    metalGear2: # not yet tested with initial status

mazeOfGalious:
