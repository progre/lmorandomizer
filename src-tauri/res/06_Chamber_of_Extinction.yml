chamberOfExtinction/magatama:
  exits:
    door.chamberOfBirth/main:
      - event:defeatedPalenque, bronzeMirror
    up.surface/ruinPathUpper:
      - feather

chamberOfExtinction/ankh:
  accessRule:
    # this is to reach palenque, not fight him
    # BUG: 羽根は必要ではなさそう
    - feather
  exits:
    up.infernoCavern/main:
  shops:
    spearAmmo, flareGunAmmo, bombAmmo:
  events:
    event:defeatedPalenque: # added sub weapon and sacred orb requirements # TODO: event:subWeaponWallForward いらなくね？
      - event:lightedUpChamberOfExtinction, event:subWeaponWallForward, pochetteKey, ankhJewel:chamberOfBirth, sacredOrb:4, gameMaster2

chamberOfExtinction/exitUpper:
  exits:
    left.templeOfTheSun/exitUpper:
    fixed.chamberOfExtinction/main:

chamberOfExtinction/exitLower:
  exits:
    left.templeOfTheSun/exitLower:
    fixed.chamberOfExtinction/main:

# TODO: The upper side should be completely lightened before going
chamberOfExtinction/main:
  accessRule:
    - event:lightedUpChamberOfExtinction
  exits:
    up.shrineOfTheMother/lower:
    fixed.chamberOfExtinction/exitUpper:
    fixed.chamberOfExtinction/exitLower:
    door.mazeOfGalious:
      - msx2, qBert, divinerSensation, bronzeMirror
  chests:
    sacredOrb:chamberOfExtinction:
      - feather # need a way out
      - originSeal # need a way out
      - holyGrail # need a way out
    map:chamberOfExtinction:
  seals:
    lifeSeal:
      - birthSeal, axe # need axe to open wall
  roms:
    timePilot:
    hyperOlympic1:
    mazeOfGalious:
      - msx2, qBert, divinerSensation
    metalGear2: # not yet tested with initial status

mazeOfGalious:
  exits:
    warp.chamberOfExtinction/ankh:
