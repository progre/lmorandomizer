chamberOfExtinction/magatama:
  exits:
    door.chamberOfBirth/main:
    up.surface/ruinPathUpper:

chamberOfExtinction/ankh:
  accessRule:
    # this is to reach palenque, not fight him
    - event:defeatedViy, feather
    - msx2, qBert, divinerSensation, feather, bronzeMirror # reach from Maze of Gallious area
  exits:
    up.infernoCavern/main:
  shops:
    spearAmmo, flareGunAmmo, bombAmmo:
  events:
    event:defeatedPalenque: # added sub weapon and sacred orb requirements # TODO: event:subWeaponWallForward いらなくね？
      - event:reachedUpperOfChamberOfBirth, event:lightedUpChamberOfExtinction, event:subWeaponWallForward, pochetteKey, ankhJewel:chamberOfBirth, sacredOrb:4, gameMaster2

chamberOfExtinction/exitUpper:
