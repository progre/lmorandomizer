twinLabyrinthsLeft/entrance:
  exits:
    fixed.twinLabyrinthsLeft/main:
      - event:releasedTwins
    fixed.twinLabyrinthsRight/entrance:
      - twinStatue
  events:
    event:releasedTwins:
      - twinStatue

twinLabyrinthsLeft/main:
  accessRule:
    - event:releasedTwins
    - event:twinLabyrinthsGlitch
  exits:
    up.templeOfTheSun/main:
    down.infernoCavern/main:
    fixed.twinLabyrinthsLeft/entrance:
    fixed.twinLabyrinthsLeft/loop:
    fixed.twinLabyrinthsRight/main:
  mainWeapons:
    katana:
      - flareGun, flareGunAmmo, knife
      - event:twinLabyrinthsGlitch, twinStatue, knife
  chests:
    ring:
    map:twinLabyrinths:
      - event:releasedTwins
    sacredOrb:twinLabyrinths:
  shops:
    lampOfTime, shurikenAmmo, toukenAmmo:
      - feather, boots # need feather and boots. puzzle is unsolvable so bombs not needed
      - event:twinLabyrinthsGlitch
  roms:
    circusCharlie:
      - event:releasedTwins
    comicBakery:
    penguinAdventure:
      - event:releasedTwins, flareGun, flareGunAmmo, bomb, bombAmmo
    gameCollection4:
      - event:releasedTwins
  events:
    event:defeatedBaphomet:
      - event:releasedTwins, flareGun, flareGunAmmo, ankhJewel:twinLabyrinths, sacredOrb:4, gameMaster2 # with just flares, fight is insanely hard without some health

twinLabyrinthsLeft/loop:
  exits:
    up.mausoleumOfTheGiants/main:
    fixed.twinLabyrinthsLeft/main:
    fixed.twinLabyrinthsRight/loop:
  shops:
    helmet, bombAmmo, fakeHandScanner:
