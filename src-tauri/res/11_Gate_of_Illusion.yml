gateOfIllusion/upper:
  exits:
    right.towerOfTheGoddess/upper:
    fixed.gateOfIllusion/main:
  chests:
    cogOfTheSoul:
      - event:reachedElevatorOfGateOfIllusion, event:escapeShu, lampOfTime # need to kill Shu to open chest
  events:
    event:brokeAngel:
      - feather

gateOfIllusion/main:
  exits:
    fixed.gateOfIllusion/upper:
      - event:brokeAngel
    door.gateOfGuidance/door:
      - event:defeatedAmphisbaena, bronzeMirror
    fixed.gateOfIllusion/towerOfRuinExit:
      - miniDoll
      - event:openedGateOfIllusionTowerOfRuinShortcut
    fixed.gateOfIllusion/middle:
      - event:reachedElevatorOfGateOfIllusion
  roms:
    roadFighter:
  events:
    event:reachedGrailOfGateOfIllusion:

gateOfIllusion/towerOfRuinExit:
  exits:
    right.towerOfRuin/illusion:
    fixed.gateOfIllusion/main:
      - event:openedGateOfIllusionTowerOfRuinShortcut
  events:
    event:openedGateOfIllusionTowerOfRuinShortcut:
      - lifeSeal

gateOfIllusion/middle:
  exits:
    fixed.gateOfIllusion/main:
    fixed.gateOfIllusion/lower:
  chests:
    keyOfEternity:
      - miniDoll, event:escapeShu # need mini doll and a way to get out from Shu area
      - option:glitch, spear, spearAmmo, holyGrail, sacredOrb:1, msx2, athleticLand, cabbagePatchKids # https://youtu.be/7_D0TQ7ZWk0?si=Cn2sTNOxnzGJOyMt&t=3223
      - option:glitch, spear, spearAmmo, holyGrail, sacredOrb:2
    protectiveClothes:
      - katana, msx2, qBert, divinerSensation # need msx2 for diviner sensation
  shops:
    f1Spirit, f1Spirit3D, weights:
  roms:
    monkeyAcademy:
  events:
    event:reachedElevatorOfGateOfIllusion:
    event:escapeShu: # this is for escaping the fight with Shu
      - axe
      - lifeSeal
      - holyGrail

gateOfIllusion/lower:
  exits:
    fixed.gateOfIllusion/middle:
      - anchor, knife, sacredOrb:1 # need health to survive water
      - anchor, knife, scalesphere
      - option:glitch # https://youtu.be/VQ3e1CJxx5c
    down.graveyardOfTheGiants/upper:
    down.templeOfMoonlight/main:
  chests:
    map:gateOfIllusion:
  roms:
    qBert:
    salamander:
  talks:
    miniDoll:
      - event:reachedGrailOfGateOfIllusion, handScanner, glyphReader, anchor
    pepper:
    anchor:
      - treasures
