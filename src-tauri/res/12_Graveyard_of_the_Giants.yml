graveyardOfTheGiants/upper:
  exits:
    up.gateOfIllusion/lower:
    fixed.graveyardOfTheGiants/main:
    fixed.graveyardOfTheGiants/lower:
  subWeapons:
    silverShield:
      - katana
  shops:
    spearAmmo, fakeSilverShield, weights:
  events:
    event:reachedLiarOfGraveyardOfTheGiants:

graveyardOfTheGiants/main:
  exits:
    right.towerOfTheGoddess/passage:
    fixed.graveyardOfTheGiants/lower:
  chests:
    contra:

graveyardOfTheGiants/east:
  exits:
    fixed.graveyardOfTheGiants/lower:
      - event:breaksBombWallInGraveyardOfTheGiants
    up.towerOfTheGoddess/upperEntrance:
    down.chamberOfBirth/main:
  subWeapons:
    bomb:
  roms:
    mopiRanger:
    spaceManbow:
      - bomb, bombAmmo
  events:
    event:reachedBackDoorOfGraveyardOfTheGiants:
    event:breaksBombWallInGraveyardOfTheGiants:
      - bomb, bombAmmo

graveyardOfTheGiants/lower:
  accessRule: # BUG: upper (gateOfIllusion) から来た時にも銅鏡を要求しているが、これらの accessRule は不要
    - event:defeatedSakit, bronzeMirror
    - event:reachedBackDoorOfGraveyardOfTheGiants
  exits:
    fixed.graveyardOfTheGiants/east:
      - event:breaksBombWallInGraveyardOfTheGiants
    fixed.graveyardOfTheGiants/upper:
      - feather
    door.mausoleumOfTheGiants/main:
      - event:defeatedSakit, bronzeMirror
    left.towerOfRuin/main:
  chests:
    map:graveyardOfTheGiants:
      - feather
      - boots
    gauntlet:
      - birthSeal, grappleClaw
  roms:
    skyJaguar:
  events:
    event:breaksBombWallInGraveyardOfTheGiants:
      - bomb, bombAmmo, sacredOrb:3 # can open bomb wall from left side
