      - event:surviveAnubis, bomb, bombAmmo # survive anubis
  roms:
    twinbee:
  events:
    event:openedCeiling:
      - shuriken, shurikenAmmo
    event:conceived:
      - womanStatue
    event:surviveAnubis: # need to survive anubis
      - bookOfTheDead
      - sacredOrb:4
