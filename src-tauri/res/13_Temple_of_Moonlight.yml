    fixed.templeOfMoonlight/main:
  chests:
    ocarina:
      - event:reachedFrontOfTempleOfMoonlight, event:escapeFromTempleOfMoonlight, flareGun, flareGunAmmo, womanStatue, feather # need a way out of moonlight
      - event:reachedFrontOfTempleOfMoonlight, event:escapeFromTempleOfMoonlight, flareGun, flareGunAmmo, womanStatue, grappleClaw # Sperm can appear by moving from C-4 to D-4 outside of Moonlight's pyramid. This is a very confusing condition and you will have to check with the Editor to find out.
