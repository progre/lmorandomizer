      - option:glitch, event:reachedFrontOfTempleOfMoonlight, shuriken, shurikenAmmo, axe # https://youtu.be/YVIJwPo2CQw
  roms:
    parodius:
      - event:escapeFromTempleOfMoonlight, flareGun, flareGunAmmo

templeOfMoonlight/lower:
