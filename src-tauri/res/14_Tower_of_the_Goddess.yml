towerOfTheGoddess/upper:
  exits:
    left.gateOfIllusion/upper:
      - keySword, planeModel # need boots to climb tower
    fixed.towerOfTheGoddess/upperEntrance:
      - planeModel # need boots to climb tower
    fixed.towerOfTheGoddess/main:
  chests:
    planeModel:
      - handScanner, glyphReader # need boots to climb tower. need to flood tower to open chest
  roms:
    unreleasedRom:
      - keySword, planeModel, msx2, qBert, divinerSensation

towerOfTheGoddess/upperEntrance:
  exits:
    fixed.towerOfTheGoddess/upper:
      - planeModel
    down.graveyardOfTheGiants/east:

towerOfTheGoddess/birthExit:
  exits:
    up.chamberOfBirth/lower:
    fixed.towerOfTheGoddess/leftTop:
      - planeModel

towerOfTheGoddess/leftTop:
  exits:
    fixed.towerOfTheGoddess/birthExit:
      # BUG: 本来は main からここに登る為に event:reachedMausoleumOfTheGiants 以降を必要とする
      - planeModel, event:reachedMausoleumOfTheGiants, handScanner, glyphReader, scalesphere, boots, helmet # need boots and helmet
    fixed.towerOfTheGoddess/main:
  events:
    event:eyeOfTruthWeight:

towerOfTheGoddess/main:
  exits:
    fixed.towerOfTheGoddess/upper:
      - feather, grappleClaw, boots
    fixed.towerOfTheGoddess/leftTop:
    left.towerOfRuin/medicine:
      - planeModel
    door.surface/main:
      - event:defeatedViy, bronzeMirror
  mainWeapons:
    mace:
  chests:
    a1Spirit:
      - planeModel, pistol, ammunition
    map:TowerOfTheGoddess:
    gradius: # do not need feather
    eyeOfTruth:
      - event:eyeOfTruthWeight # need to reach entrance to lower birth to place weights
  roms:
    pippols:
      - lampOfTime
  events:
    event:reachedTowerOfTheGoddess:

towerOfTheGoddess/passage:
  exits:
    left.graveyardOfTheGiants/main:
    right.templeOfMoonlight/lower:
