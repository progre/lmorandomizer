towerOfRuin/top:
  exits:
    door.infernoCavern/spikes:
    fixed.towerOfRuin/medicine:

towerOfRuin/medicine:
  accessRule:
    - event:reachedBackDoorOfSurface, event:defeatedBaphomet # reachedBackDoorOfSurface already includes bronze mirror
  exits:
    fixed.towerOfRuin/top:
    right.towerOfTheGoddess/main:
    fixed.towerOfRuin/main:
  chests:
    djedPillar:
      - mulanaTalisman, ocarina # need to talk to sage in spring. need mulana talisman to get item
  roms:
    badlands:
      - keySword

towerOfRuin/illusion:
  exits:
    left.gateOfIllusion/main:
    fixed.towerOfRuin/main:

towerOfRuin/main:
  accessRule:
    - event:reachedFrontOfTowerOfRuin
  exits:
    fixed.towerOfRuin/illusion:
    right.graveyardOfTheGiants/lower:
    fixed.towerOfRuin/southWestDoor:
  subWeapons:
    ankhJewel:towerOfRuin:
    spear:
  chests:
    map:towerOfRuin:
    sacredOrb:towerOfRuin:
  shops:
    knightmare, bombAmmo, flareGunAmmo:
      - katana, feather
      - katana, boots, grappleClaw # can reach with boots and grapple claw
  roms:
    ruinsRam16K:
      - event:reachedGrailOfGateOfIllusion, miniDoll
    hyperSports3:
      - iceCape
    shinSynthesizer:
      - spear, spearAmmo

towerOfRuin/southWestDoor:
  exits:
    fixed.towerOfRuin/main:
    door.infernoCavern/viy:
