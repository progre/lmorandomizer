chamberOfBirth/main:
  accessRule:
    - event:reachedUpperOfChamberOfBirth
  exits:
    up.graveyardOfTheGiants/east:
    door.chamberOfExtinction/magatama:
    left.chamberOfBirth/lower:
  chests:
    vessel:
      - silverShield
      - angelShield
    perfume:
      - cogOfTheSoul
    womanStatue:
      - feather
      - option:glitch, holyGrail
  roms:
    gr3:
    konamiSoccer:

chamberOfBirth/lower:
  accessRule:
    - event:reachedLowerOfChamberOfBirth
  exits:
    down.towerOfTheGoddess/main:
    right.chamberOfBirth/main:
  chests:
    map:chamberOfBirth:
    pochetteKey:
      - bomb, bombAmmo, cogOfTheSoul
  shops:
    ammunition, ankhJewel:chamberOfBirth, weights:
      - cogOfTheSoul
  roms:
    kingKong2:
    heavenAndEarth:
